version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/packages/webui"
    schedule:
      interval: "weekly"
    groups:
      web-ui:
        patterns: ["*"]
