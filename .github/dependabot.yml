version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/packages/webui"
    schedule:
      interval: "weekly"
    groups:
      web-ui:
        patterns: ["*"]
    ignore:
      # Spezi Web Configurations 0.7 supports ESLint 9 and TypeScript below 6.1.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Heartwood and the Spezi design system currently target Node 24.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
