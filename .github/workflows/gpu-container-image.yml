name: GPU Container Image

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: gpu-container-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contract:
    name: Validate GPU image contracts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Validate build graph
        run: >-
          docker buildx bake --file docker-bake.hcl --print
          runtime-gpu-nvidia terra-runtime-gpu-nvidia
          > /tmp/gpu-build-graph.json
      - name: Validate runtime lock and launcher
        run: |
          grep --fixed-strings 'vllm-0.10.1.1%2Bcu118' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'certifi-2026.6.17-py3-none-any.whl' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'ray==2.55.0' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'setuptools==78.1.1' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'torch-2.7.1%2Bcu118-cp312-cp312-manylinux_2_28_x86_64.whl' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'torchaudio-2.7.1%2Bcu118-cp312-cp312-manylinux_2_28_x86_64.whl' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'torchvision-0.22.1%2Bcu118-cp312-cp312-manylinux_2_28_x86_64.whl' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'xformers-0.0.31-cp39-abi3-manylinux_2_28_x86_64.whl' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'transformers==5.5.0' images/gpu/vllm-requirements.txt
          grep --fixed-strings 'nvidia-cuda-runtime-cu11==11.8.89' images/gpu/vllm-requirements.txt
          if grep --fixed-strings --quiet -- '--extra-index-url https://download.pytorch.org/whl/cu118' images/gpu/vllm-requirements.txt; then
            echo 'CUDA artifacts must use immutable wheel URLs instead of exposing the CUDA index to general dependency resolution.' >&2
            exit 1
          fi
          if grep --fixed-strings --quiet 'nvidia-cuda-runtime-cu13' images/gpu/vllm-requirements.txt; then
            echo 'CUDA 13 is incompatible with the NVIDIA driver currently available on Terra.' >&2
            exit 1
          fi
          if grep --fixed-strings --quiet 'certifi==2022.12.7' images/gpu/vllm-requirements.txt; then
            echo 'The GPU lock must not use the obsolete CA bundle mirrored by the CUDA index.' >&2
            exit 1
          fi
          grep --fixed-strings -- '--hash=sha256:' images/gpu/vllm-requirements.txt
          bash -n images/gpu/start_vllm.sh
          bash -n images/gpu/heartwood-vllm
          test -x images/gpu/start_vllm.sh
          test -x images/gpu/heartwood-vllm

  pull-request-build:
    name: Build GPU candidate ${{ matrix.target }}
    if: github.event_name == 'pull_request'
    needs: contract
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [runtime-gpu-nvidia, terra-runtime-gpu-nvidia]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Reclaim runner space for GPU build
        run: |
          df --human-readable /
          sudo rm -rf \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift
          df --human-readable /
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and validate candidate without image export
        env:
          TARGET: ${{ matrix.target }}
        run: |
          docker buildx bake --progress=plain --file docker-bake.hcl \
            --set "${TARGET}.target=gpu-ci-validate" \
            --set "${TARGET}.output=type=cacheonly" \
            --set "${TARGET}.attest=type=sbom,disabled=true" \
            --set "${TARGET}.attest=type=provenance,disabled=true" \
            "${TARGET}"

  build:
    name: Build And Validate ${{ matrix.target }}
    if: github.ref == 'refs/heads/main'
    needs: contract
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runtime-gpu-nvidia
            commit_suffix: gpu-nvidia
            flatten: "false"
            media_output: type=image,push-by-digest=true,name-canonical=true,push=true
          - target: terra-runtime-gpu-nvidia
            commit_suffix: terra-gpu-nvidia
            flatten: "true"
            media_output: type=image,push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build candidate by digest
        id: candidate
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          TARGET: ${{ matrix.target }}
          MEDIA_OUTPUT: ${{ matrix.media_output }}
        run: |
          docker buildx bake --file docker-bake.hcl \
            --set "${TARGET}.tags=${IMAGE_NAME}" \
            --set "${TARGET}.output=${MEDIA_OUTPUT},name=${IMAGE_NAME}" \
            --metadata-file /tmp/gpu-metadata.json \
            "${TARGET}"
          digest="$(python3 images/scripts/read_buildx_digest.py /tmp/gpu-metadata.json "${TARGET}")"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "reference=${IMAGE_NAME}@${digest}" >> "${GITHUB_OUTPUT}"
      - name: Verify candidate contents
        env:
          CANDIDATE: ${{ steps.candidate.outputs.reference }}
        run: |
          docker pull --platform linux/amd64 "${CANDIDATE}"
          docker run --rm --platform linux/amd64 \
            --entrypoint /opt/heartwood/images/gpu/verify_runtime.sh "${CANDIDATE}"
      - name: Create and verify immutable commit tag
        env:
          CANDIDATE: ${{ steps.candidate.outputs.reference }}
          CANDIDATE_DIGEST: ${{ steps.candidate.outputs.digest }}
          COMMIT_SUFFIX: ${{ matrix.commit_suffix }}
          FLATTEN: ${{ matrix.flatten }}
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          commit_ref="${IMAGE_NAME}:sha-${GIT_SHA}-${COMMIT_SUFFIX}"
          if inspect="$(docker buildx imagetools inspect "${commit_ref}" 2>/dev/null)"; then
            commit_digest="$(awk '$1 == "Digest:" {print $2; exit}' <<<"${inspect}")"
          else
            create_args=()
            if [ "${FLATTEN}" = "true" ]; then
              create_args+=(--prefer-index=false)
            fi
            docker buildx imagetools create "${create_args[@]}" \
              --tag "${commit_ref}" "${CANDIDATE}"
            inspect="$(docker buildx imagetools inspect "${commit_ref}")"
            commit_digest="$(awk '$1 == "Digest:" {print $2; exit}' <<<"${inspect}")"
          fi
          if [ "${commit_digest}" != "${CANDIDATE_DIGEST}" ]; then
            echo "immutable GPU commit tag does not match the validated candidate" >&2
            exit 1
          fi
          raw="$(docker buildx imagetools inspect --raw "${commit_ref}")"
          if [ "${FLATTEN}" = "true" ]; then
            if ! jq --exit-status '
              .mediaType == "application/vnd.docker.distribution.manifest.v2+json"
              and .config.mediaType == "application/vnd.docker.container.image.v1+json"
            ' <<<"${raw}" >/dev/null; then
              media_type="$(jq -r '.mediaType // "<missing>"' <<<"${raw}")"
              config_media_type="$(jq -r '.config.mediaType // "<missing>"' <<<"${raw}")"
              echo "immutable Terra GPU tag has incompatible media types: ${commit_ref}" >&2
              echo "observed media type: ${media_type}; config media type: ${config_media_type}" >&2
              exit 1
            fi
          else
            if ! jq --exit-status '
              [.manifests[] | select(.platform.os == "linux") | "\(.platform.os)/\(.platform.architecture)"]
              == ["linux/amd64"]
            ' <<<"${raw}" >/dev/null; then
              media_type="$(jq -r '.mediaType // "<missing>"' <<<"${raw}")"
              platforms="$(
                jq -r '
                  [.manifests[]? | select(.platform.os == "linux") | "\(.platform.os)/\(.platform.architecture)"]
                  | join(", ")
                ' <<<"${raw}"
              )"
              echo "immutable generic GPU tag has an incompatible index: ${commit_ref}" >&2
              echo "observed media type: ${media_type}; Linux platforms: ${platforms:-<none>}" >&2
              exit 1
            fi
          fi

  promote:
    name: Promote GPU Channel Tags
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote validated generic and Terra tags
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          current_main="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          if [ "${current_main}" != "${GIT_SHA}" ]; then
            echo "refusing to move GPU channel tags from a stale main workflow" >&2
            exit 1
          fi
          for tuple in \
            "gpu-nvidia edge-gpu-nvidia false" \
            "terra-gpu-nvidia edge-terra-gpu-nvidia true"; do
            read -r suffix channel flatten <<<"${tuple}"
            commit_ref="${IMAGE_NAME}:sha-${GIT_SHA}-${suffix}"
            commit_digest="$(docker buildx imagetools inspect "${commit_ref}" | awk '$1 == "Digest:" {print $2; exit}')"
            create_args=()
            if [ "${flatten}" = "true" ]; then
              create_args+=(--prefer-index=false)
            fi
            docker buildx imagetools create "${create_args[@]}" \
              --tag "${IMAGE_NAME}:${channel}" "${commit_ref}"
            channel_digest="$(docker buildx imagetools inspect "${IMAGE_NAME}:${channel}" | awk '$1 == "Digest:" {print $2; exit}')"
            if [ "${channel_digest}" != "${commit_digest}" ]; then
              echo "promoted ${channel} digest does not match ${commit_ref}" >&2
              exit 1
            fi
          done
