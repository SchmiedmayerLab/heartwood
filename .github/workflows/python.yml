name: Python

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - name: Install the pinned Python toolchain
        run: uv python install
      - name: Install the workspace (locked)
        run: uv sync --locked --all-extras
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check --output-format=github .
      - name: Type-check
        run: uv run mypy packages
      - name: Check synthetic artifacts
        run: uv run heartwood-fixtures fixtures skills evals
      - name: Test with coverage
        run: uv run pytest --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
