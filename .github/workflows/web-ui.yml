name: Web UI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ui-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web-ui:
    name: TypeScript, Unit, And Browser Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/webui/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: packages/webui
        run: npm ci
      - name: Check formatting
        working-directory: packages/webui
        run: npm run format:check
      - name: Lint
        working-directory: packages/webui
        run: npm run lint
      - name: Type-check
        working-directory: packages/webui
        run: npm run typecheck
      - name: Run unit tests
        working-directory: packages/webui
        run: npm run test
      - name: Build assets
        working-directory: packages/webui
        run: npm run build
      - name: Check npm licenses
        working-directory: packages/webui
        run: npm run license:check
      - name: Audit npm dependencies
        working-directory: packages/webui
        run: npm audit --audit-level=moderate
      - name: Install Playwright Chromium
        working-directory: packages/webui
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke test
        working-directory: packages/webui
        run: npm run test:e2e
      - name: Install the pinned Python toolchain
        run: uv python install
      - name: Install the Python workspace
        run: uv sync --locked --all-extras
      - name: Run gateway-served proxy smoke test
        run: npm run test:gateway --prefix packages/webui
      - name: Run Jupyter proxy smoke test
        run: npm run test:jupyter-proxy --prefix packages/webui
      - name: Run real browser and CLI reference analysis
        run: npm run test:reference-analysis --prefix packages/webui
