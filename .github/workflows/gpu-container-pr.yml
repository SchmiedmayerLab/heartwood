name: GPU Container Pull Request

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpu-container-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Validate GPU image contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate GPU runtime contract
        uses: ./.github/actions/validate-gpu-contract
  build:
    name: Build GPU candidate ${{ matrix.target }}
    needs: contract
    runs-on: blacksmith-16vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        target: [runtime-gpu-nvidia, terra-runtime-gpu-nvidia]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and validate candidate without image export
        uses: docker/bake-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          files: docker-bake.hcl
          provenance: false
          sbom: false
          source: .
          targets: ${{ matrix.target }}
          set: |
            ${{ matrix.target }}.target=gpu-ci-validate
            ${{ matrix.target }}.output=type=cacheonly
            ${{ matrix.target }}.cache-from=type=gha,scope=gpu-${{ matrix.target }}
            ${{ matrix.target }}.cache-to=type=gha,scope=gpu-${{ matrix.target }},mode=min
