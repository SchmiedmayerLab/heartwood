name: Main Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-validation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  containers:
    name: Container Images
    uses: ./.github/workflows/container-image.yml
  documentation:
    name: Documentation
    uses: ./.github/workflows/documentation.yml
  capable-model:
    name: Capable Model Acceptance
    uses: ./.github/workflows/capable-model.yml
  gpu-containers:
    name: GPU Container Images
    uses: ./.github/workflows/gpu-container-image.yml
  native-assets:
    name: Native Release Assets
    uses: ./.github/workflows/native-release.yml
  python:
    name: Python
    uses: ./.github/workflows/python.yml
  secrets:
    name: Secret Scan
    uses: ./.github/workflows/gitleaks.yml
  validation:
    name: Repository Validation
    uses: ./.github/workflows/validate.yml
  web-ui:
    name: Web UI
    uses: ./.github/workflows/web-ui.yml
  release-ready:
    name: Release Candidate Ready
    if: ${{ always() }}
    needs:
      - capable-model
      - containers
      - documentation
      - gpu-containers
      - native-assets
      - python
      - secrets
      - validation
      - web-ui
    runs-on: ubuntu-24.04
    steps:
      - name: Require every validation workflow
        env:
          VALIDATION_RESULTS: ${{ toJson(needs) }}
        run: |
          jq --exit-status 'to_entries | all(.value.result == "success")' \
            <<<"${VALIDATION_RESULTS}"
