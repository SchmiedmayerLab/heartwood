# This workflow builds the generic image and runs the offline stack smoke test
# with runtime network disabled through Docker Compose.
# See design/09-implementation-plan.md.

name: Container Smoke Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Offline stack smoke test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Check Dockerfile
        run: docker buildx build --check --file images/generic/Dockerfile .
      - name: Check image flavor targets
        run: docker buildx bake --file docker-bake.hcl --print runtime smoke providers
      - name: Build the generic image and run the offline stack
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: docker compose -f images/generic/compose.yaml run --rm --build heartwood
