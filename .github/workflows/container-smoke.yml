name: Container Smoke Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Generic OpenHands smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: blacksmith-8vcpu-ubuntu-2404
            cache_scope: runtime-amd64
          - platform: linux/arm64
            runner: blacksmith-8vcpu-ubuntu-2404-arm
            cache_scope: runtime-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Check Dockerfile
        run: >-
          docker buildx bake --file docker-bake.hcl --call=check
          --set runtime.output=type=cacheonly
          --set runtime.attest=type=sbom,disabled=true
          --set runtime.attest=type=provenance,disabled=true
          runtime
      - name: Check image target
        run: >-
          docker buildx bake --file docker-bake.hcl --print
          runtime runtime-gpu-nvidia
      - name: Build the no-weight image and run the isolated OpenHands stack
        env:
          CACHE_SCOPE: ${{ matrix.cache_scope }}
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          docker buildx bake --file docker-bake.hcl --load \
            --set "runtime.platform=${PLATFORM}" \
            --set "runtime.tags=heartwood-runtime-smoke:local" \
            --set "runtime.cache-from=type=gha,scope=${CACHE_SCOPE}" \
            --set "runtime.cache-to=type=gha,scope=${CACHE_SCOPE},mode=max" \
            --set "runtime.attest=type=sbom,disabled=true" \
            --set "runtime.attest=type=provenance,disabled=true" \
            runtime
          docker compose -f images/generic/compose.yaml run --rm --no-build heartwood
      - name: Verify named-volume persistence
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: bash images/generic/scripts/container_persistence_smoke.sh
      - name: Verify host-user bind-mount persistence
        run: >-
          bash images/generic/scripts/bind_mount_user_smoke.sh
          heartwood-runtime-smoke:local
          ${{ matrix.platform }}
      - name: Download and verify CI-only model fixture
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: >-
          docker run --rm
          --volume heartwood-ci-project:/workspace
          heartwood-runtime-smoke:local
          heartwood models download llama-cpp-stories260k-ci
      - name: Run mounted local inference without network
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: >-
          docker compose -f images/generic/compose.yaml run --rm --no-deps
          --volume heartwood-ci-project:/workspace
          --env HEARTWOOD_LOCAL_MODEL_PATH=/workspace/.heartwood/models/llama-cpp-stories260k-ci/tinyllamas/stories260K.gguf
          heartwood bash /opt/heartwood/images/generic/scripts/local_inference_smoke.sh

  terra-smoke:
    name: Terra image smoke test (linux/amd64)
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker
      - name: Check platform Dockerfile
        run: >-
          docker buildx bake --file docker-bake.hcl --call=check
          --set terra-runtime.output=type=cacheonly
          terra-runtime
      - name: Check Terra image targets
        run: >-
          docker buildx bake --file docker-bake.hcl --print
          terra-runtime terra-runtime-gpu-nvidia terra-ci
      - name: Build Terra-compatible CI base
        run: >-
          docker buildx build --load --platform linux/amd64
          --tag heartwood-terra-ci-base:local
          --file images/platform/terra-ci-base.Dockerfile
          images/platform
      - name: Build no-weight Terra CI image
        run: >-
          docker buildx bake --file docker-bake.hcl --load
          --set terra-ci.platform=linux/amd64
          terra-ci
      - name: Run Terra Jupyter contract smoke
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --entrypoint bash
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          /opt/heartwood/images/platform/scripts/terra_jupyter_contract_smoke.sh
      - name: Run Terra platform image smoke
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --entrypoint bash
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          -c 'mkdir -p /home/jupyter/synthetic-analysis &&
          cd /home/jupyter/synthetic-analysis &&
          exec /opt/heartwood/images/platform/scripts/terra_image_smoke.sh'
      - name: Run Terra current-directory persistence smoke
        run: >-
          bash images/platform/scripts/terra_project_persistence_smoke.sh
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
      - name: Run Terra OpenHands smoke
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --entrypoint bash
          --env HEARTWOOD_SMOKE_PROJECT=/home/jupyter/synthetic-agent-analysis
          --env HEARTWOOD_TERRA_DEMO_PROJECT_ROOT=/home/jupyter/synthetic-notebook-analysis
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          /opt/heartwood/images/generic/scripts/offline_stack_smoke.sh
      - name: Download and verify Terra CI-only model fixture
        run: >-
          docker run --rm --platform linux/amd64
          --entrypoint bash
          --volume heartwood-terra-ci-project:/home/jupyter
          --env GOOGLE_PROJECT=heartwood-ci
          --env CLUSTER_NAME=terra-ci-model-safety-smoke
          --env WORKSPACE_ID=terra-ci-model-safety-smoke
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          -c 'mkdir -p /home/jupyter/model-analysis &&
          cd /home/jupyter/model-analysis &&
          exec heartwood models download llama-cpp-stories260k-ci'
      - name: Verify Terra CI-only model remains non-agent
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --workdir /home/jupyter/model-analysis --entrypoint bash
          --volume heartwood-terra-ci-project:/home/jupyter
          --env GOOGLE_PROJECT=heartwood-ci
          --env CLUSTER_NAME=terra-ci-model-safety-smoke
          --env WORKSPACE_ID=terra-ci-model-safety-smoke
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          /opt/heartwood/images/platform/scripts/terra_ci_model_safety_smoke.sh
      - name: Run Terra mounted local inference without network
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --workdir /home/jupyter/model-analysis --entrypoint bash
          --volume heartwood-terra-ci-project:/home/jupyter
          --env HEARTWOOD_LOCAL_MODEL_PATH=/home/jupyter/model-analysis/.heartwood/models/llama-cpp-stories260k-ci/tinyllamas/stories260K.gguf
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          /opt/heartwood/images/generic/scripts/local_inference_smoke.sh
      - name: Run Terra Jupyter and internal gateway smoke
        run: >-
          bash images/platform/scripts/terra_jupyter_launch_smoke.sh
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
      - name: Run Terra Leonardo Jupyter and internal gateway smoke
        env:
          HEARTWOOD_TERRA_HOST_PORT: "8001"
          HEARTWOOD_TERRA_JUPYTER_MODE: leonardo
        run: >-
          bash images/platform/scripts/terra_jupyter_launch_smoke.sh
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
