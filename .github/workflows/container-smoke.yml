name: Container Smoke Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_capable_model:
        description: Run the resource-intensive 7B mounted-model acceptance job
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: container-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Generic OpenHands smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Check Dockerfile
        run: docker buildx build --check --file images/generic/Dockerfile .
      - name: Check image target
        run: docker buildx bake --file docker-bake.hcl --print runtime
      - name: Build the no-weight image and run the isolated OpenHands stack
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: docker compose -f images/generic/compose.yaml run --rm --build heartwood
      - name: Verify named-volume persistence
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: bash images/generic/scripts/container_persistence_smoke.sh
      - name: Download and verify CI-only model fixture
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: >-
          docker run --rm
          --volume heartwood-ci-model:/home/heartwood/.cache/heartwood/models
          heartwood-runtime-smoke:local
          heartwood models download llama-cpp-stories260k-ci
      - name: Run mounted local inference without network
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: >-
          docker compose -f images/generic/compose.yaml run --rm --no-deps
          --volume heartwood-ci-model:/models:ro
          --env HEARTWOOD_LOCAL_MODEL_PATH=/models/llama-cpp-stories260k-ci/tinyllamas/stories260K.gguf
          heartwood bash images/generic/scripts/local_inference_smoke.sh

  capable-model:
    name: Capable Model OpenHands Acceptance (linux/amd64)
    if: github.event_name == 'workflow_dispatch' && inputs.run_capable_model
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker
      - name: Build no-weight runtime image
        run: >-
          docker buildx build --load --platform linux/amd64
          --tag heartwood-capable:local
          --file images/generic/Dockerfile .
      - name: Prepare external model storage
        run: |
          sudo mkdir -p /tmp/heartwood-models
          sudo chown 10001:10001 /tmp/heartwood-models
      - name: Download and verify reviewed agent model
        run: >-
          docker run --rm --platform linux/amd64
          --volume /tmp/heartwood-models:/models
          --env HEARTWOOD_MODEL_CACHE=/models
          heartwood-capable:local
          heartwood models download qwen25-7b-instruct-q4_k_m --cache /models
      - name: Run mounted capable model without network
        run: >-
          docker run --rm --platform linux/amd64 --network none --read-only
          --volume /tmp/heartwood-models:/models:ro
          --tmpfs /tmp:rw,nosuid,nodev,size=4g
          --tmpfs /home/heartwood/.cache:rw,nosuid,nodev,size=1g,uid=10001,gid=10001,mode=0700
          --tmpfs /home/heartwood/.openhands:rw,nosuid,nodev,size=256m,uid=10001,gid=10001,mode=0700
          --cap-drop ALL
          --security-opt no-new-privileges:true
          --pids-limit 512
          --env HEARTWOOD_LOCAL_MODEL_PATH=/models/qwen25-7b-instruct-q4_k_m/Qwen2.5-7B-Instruct-Q4_K_M.gguf
          heartwood-capable:local
          bash images/generic/scripts/capable_model_e2e.sh

  terra-smoke:
    name: Terra image smoke test (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker
      - name: Check platform Dockerfile
        run: docker buildx build --check --platform linux/amd64 --file images/platform/Dockerfile .
      - name: Check Terra image targets
        run: docker buildx bake --file docker-bake.hcl --print terra-runtime terra-ci
      - name: Build Terra-compatible CI base
        run: >-
          docker buildx build --load --platform linux/amd64
          --tag heartwood-terra-ci-base:local
          --file images/platform/terra-ci-base.Dockerfile
          images/platform
      - name: Build no-weight Terra CI image
        run: >-
          docker buildx bake --file docker-bake.hcl --load
          --set terra-ci.platform=linux/amd64
          terra-ci
      - name: Run Terra Jupyter contract smoke
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --entrypoint bash
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          /opt/heartwood/images/platform/scripts/terra_jupyter_contract_smoke.sh
      - name: Run Terra platform image smoke
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --workdir /opt/heartwood --entrypoint bash
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          images/platform/scripts/terra_image_smoke.sh
      - name: Run Terra OpenHands smoke
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --workdir /opt/heartwood --entrypoint bash
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
          images/generic/scripts/offline_stack_smoke.sh
      - name: Run Terra Jupyter launch smoke
        run: >-
          bash images/platform/scripts/terra_jupyter_launch_smoke.sh
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
      - name: Run Terra Leonardo Jupyter launch smoke
        env:
          HEARTWOOD_TERRA_HOST_PORT: "8001"
          HEARTWOOD_TERRA_JUPYTER_MODE: leonardo
        run: >-
          bash images/platform/scripts/terra_jupyter_launch_smoke.sh
          ghcr.io/schmiedmayerlab/heartwood:edge-terra-ci
