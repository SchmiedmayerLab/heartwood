# This workflow builds the generic image and runs the offline stack smoke test
# with runtime network disabled through Docker Compose.
# See design/09-implementation-plan.md.

name: Container Smoke Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Offline stack smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build the generic image and run the offline stack
        run: docker compose -f images/generic/compose.yaml run --rm heartwood
