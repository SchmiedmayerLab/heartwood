name: Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build generic image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image by digest
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          docker buildx bake --file docker-bake.hcl \
            --set runtime.platform="${DOCKER_PLATFORM}" \
            --set runtime.tags="${IMAGE_NAME}" \
            --set "runtime.output=type=image,name=${IMAGE_NAME},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/metadata.json \
            runtime
          digest="$(jq -r '.runtime["containerimage.digest"]' /tmp/metadata.json)"
          test "${digest}" != "null"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: generic-digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-platform generic image
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          pattern: generic-digest-*
          path: /tmp/digests
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish generic image tags
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_CHANNEL: edge
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          sources=()
          for digest in /tmp/digests/*; do
            sources+=("${IMAGE_NAME}@sha256:$(basename "${digest}")")
          done
          test "${#sources[@]}" -eq 2
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}" \
            "${sources[@]}"
      - name: Verify generic image tags
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_CHANNEL: edge
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          for tag in "${IMAGE_CHANNEL}" "sha-${GIT_SHA}"; do
            raw="$(docker buildx imagetools inspect --raw "${IMAGE_NAME}:${tag}")"
            grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"amd64"' <<<"${raw}"
            grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"arm64"' <<<"${raw}"
          done
      - name: Pull published generic image
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: docker pull "${IMAGE_NAME}:edge"
      - name: Run published generic OpenHands smoke
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: >-
          docker run --rm --init --network none --read-only
          --cap-drop ALL --security-opt no-new-privileges=true --pids-limit 256
          --tmpfs /tmp:rw,nosuid,nodev,size=1g
          --tmpfs /home/heartwood/.cache:rw,nosuid,nodev,size=512m
          --tmpfs /home/heartwood/.openhands:rw,nosuid,nodev,size=64m
          --env HEARTWOOD_AGENT_BACKEND=openhands-sdk
          "${IMAGE_NAME}:edge"
          bash images/generic/scripts/offline_stack_smoke.sh

  build-terra:
    name: Build and verify Terra image (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Terra image
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
          GIT_SHA: ${{ github.sha }}
          IMAGE_CHANNEL: edge
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: docker buildx bake --file docker-bake.hcl terra-runtime
      - name: Verify Terra image tags
        env:
          GIT_SHA: ${{ github.sha }}
          IMAGE_CHANNEL: edge
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: >-
          python3 images/platform/scripts/verify_registry_manifest.py
          --manifest images/platforms.toml
          --platform terra
          --image-name "${IMAGE_NAME}"
          --image-channel "${IMAGE_CHANNEL}"
          --git-sha "${GIT_SHA}"
      - name: Pull published Terra image
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: docker pull "${IMAGE_NAME}:edge-terra"
      - name: Run published Terra Jupyter contract smoke
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --entrypoint bash
          "${IMAGE_NAME}:edge-terra"
          /opt/heartwood/images/platform/scripts/terra_jupyter_contract_smoke.sh
      - name: Run published Terra OpenHands smoke
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --workdir /opt/heartwood --entrypoint bash
          "${IMAGE_NAME}:edge-terra"
          images/generic/scripts/offline_stack_smoke.sh
      - name: Run published Terra Jupyter launch smoke
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: bash images/platform/scripts/terra_jupyter_launch_smoke.sh "${IMAGE_NAME}:edge-terra"
      - name: Run published Terra Leonardo Jupyter launch smoke
        env:
          HEARTWOOD_TERRA_HOST_PORT: "8001"
          HEARTWOOD_TERRA_JUPYTER_MODE: leonardo
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: bash images/platform/scripts/terra_jupyter_launch_smoke.sh "${IMAGE_NAME}:edge-terra"
