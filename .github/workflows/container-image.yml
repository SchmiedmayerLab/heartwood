name: Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build generic image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push architecture image flavors
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
          IMAGE_TAG_SUFFIX: -${{ matrix.suffix }}
          DOCKER_PLATFORM: ${{ matrix.platform }}
        run: >-
          docker buildx bake --file docker-bake.hcl --push
          --set runtime.platform="${DOCKER_PLATFORM}"
          --set smoke.platform="${DOCKER_PLATFORM}"
          --set providers.platform="${DOCKER_PLATFORM}"
          runtime smoke providers

  build-terra:
    name: Build Terra image (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free runner disk for Terra image
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          df -h
      - name: Build and push Terra image flavors
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        run: >-
          docker buildx bake --file docker-bake.hcl
          --set terra-runtime.platform="linux/amd64"
          --set terra-smoke.platform="linux/amd64"
          terra-runtime terra-smoke
      - name: Verify Terra image tags
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          image_name = os.environ["IMAGE_NAME"]
          image_channel = os.environ["IMAGE_CHANNEL"]
          git_sha = os.environ["GIT_SHA"]
          repository = image_name.removeprefix("ghcr.io/")
          repository_path = urllib.parse.quote(repository, safe="/")
          expected_manifest_media_type = "application/vnd.docker.distribution.manifest.v2+json"
          expected_config_media_type = "application/vnd.docker.container.image.v1+json"
          tags = [
              f"{image_channel}-terra",
              f"sha-{git_sha}-terra",
              f"{image_channel}-terra-smoke",
              f"sha-{git_sha}-terra-smoke",
          ]

          def fetch_json(url: str, headers: dict[str, str]) -> tuple[str, dict[str, object]]:
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      content_type = response.headers.get_content_type()
                      payload = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as error:
                  details = error.read().decode("utf-8", "replace")
                  raise SystemExit(f"{url} returned HTTP {error.code}: {details}") from error
              return content_type, payload

          token_url = "https://ghcr.io/token?" + urllib.parse.urlencode(
              {"service": "ghcr.io", "scope": f"repository:{repository}:pull"}
          )
          _, token_payload = fetch_json(token_url, {})
          token = token_payload["token"]
          headers = {
              "Accept": expected_manifest_media_type,
              "Authorization": f"Bearer {token}",
          }

          for tag in tags:
              image_ref = f"{image_name}:{tag}"
              tag_path = urllib.parse.quote(tag, safe="")
              manifest_url = f"https://ghcr.io/v2/{repository_path}/manifests/{tag_path}"
              print(f"Verifying Leonardo-compatible Docker manifest for {image_ref}")
              content_type, manifest = fetch_json(manifest_url, headers)
              if content_type != expected_manifest_media_type:
                  raise SystemExit(
                      f"{image_ref} returned {content_type}, expected {expected_manifest_media_type}"
                  )
              if manifest.get("mediaType") != expected_manifest_media_type:
                  raise SystemExit(f"{image_ref} is not a Docker schema-2 image manifest")
              if "manifests" in manifest:
                  raise SystemExit(f"{image_ref} returned an image index instead of one image manifest")
              config = manifest.get("config")
              if not isinstance(config, dict):
                  raise SystemExit(f"{image_ref} has no config descriptor")
              if config.get("mediaType") != expected_config_media_type:
                  raise SystemExit(f"{image_ref} has non-Docker config media type {config.get('mediaType')}")
              digest = config.get("digest")
              if not isinstance(digest, str):
                  raise SystemExit(f"{image_ref} has no config digest")
              config_url = f"https://ghcr.io/v2/{repository_path}/blobs/{urllib.parse.quote(digest, safe=':')}"
              _, image_config = fetch_json(config_url, {"Authorization": f"Bearer {token}"})
              if image_config.get("os") != "linux" or image_config.get("architecture") != "amd64":
                  raise SystemExit(
                      f"{image_ref} is {image_config.get('os')}/{image_config.get('architecture')}, expected linux/amd64"
                  )

          sys.exit(0)
          PY

  publish:
    name: Publish multi-architecture image manifests
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish image manifests
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}-smoke" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}-smoke" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-smoke-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-smoke-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}-providers" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}-providers" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-providers-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-providers-arm64"
      - name: Verify image manifests
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
        run: |
          public_manifest_raw() {
            local image_ref="${IMAGE_NAME}:$1"
            local docker_config
            local raw
            docker_config="$(mktemp -d)"
            echo "Verifying public GHCR access for ${image_ref}" >&2
            if ! raw="$(DOCKER_CONFIG="${docker_config}" docker buildx imagetools inspect --raw "${image_ref}")"; then
              rm -rf "${docker_config}"
              return 1
            fi
            rm -rf "${docker_config}"
            printf '%s\n' "${raw}"
          }
          verify_multi_platform_tag() {
            image_ref="${IMAGE_NAME}:$1"
            raw="$(public_manifest_raw "$1")"
            printf '%s\n' "${raw}" | grep -E '"architecture"[[:space:]]*:[[:space:]]*"amd64"'
            printf '%s\n' "${raw}" | grep -E '"architecture"[[:space:]]*:[[:space:]]*"arm64"'
          }
          verify_multi_platform_tag "${IMAGE_CHANNEL}"
          verify_multi_platform_tag "sha-${GIT_SHA}"
          verify_multi_platform_tag "${IMAGE_CHANNEL}-smoke"
          verify_multi_platform_tag "sha-${GIT_SHA}-smoke"
          verify_multi_platform_tag "${IMAGE_CHANNEL}-providers"
          verify_multi_platform_tag "sha-${GIT_SHA}-providers"
