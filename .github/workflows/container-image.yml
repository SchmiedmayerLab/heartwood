name: Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build generic image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free runner disk for generic image
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          df -h
      - name: Build and push architecture image flavors
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
          IMAGE_TAG_SUFFIX: -${{ matrix.suffix }}
          DOCKER_PLATFORM: ${{ matrix.platform }}
        run: >-
          docker buildx bake --file docker-bake.hcl --push
          --set runtime.platform="${DOCKER_PLATFORM}"
          --set smoke.platform="${DOCKER_PLATFORM}"
          --set providers.platform="${DOCKER_PLATFORM}"
          runtime smoke providers

  build-terra:
    name: Build Terra image (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free runner disk for Terra image
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          df -h
      - name: Build and push Terra image flavors
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        run: >-
          docker buildx bake --file docker-bake.hcl
          --set terra-runtime.platform="linux/amd64"
          --set terra-smoke.platform="linux/amd64"
          terra-runtime terra-smoke
      - name: Verify Terra image tags
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
        run: >-
          python3 images/platform/scripts/verify_registry_manifest.py
          --manifest images/platforms.toml
          --platform terra
          --image-name "${IMAGE_NAME}"
          --image-channel "${IMAGE_CHANNEL}"
          --git-sha "${GIT_SHA}"
      - name: Pull published Terra runtime image
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
        run: docker pull "${IMAGE_NAME}:${IMAGE_CHANNEL}-terra"
      - name: Run published Terra Jupyter contract smoke
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
        run: >-
          docker run --rm --platform linux/amd64 --network none
          --entrypoint bash
          "${IMAGE_NAME}:${IMAGE_CHANNEL}-terra"
          /opt/heartwood/images/platform/scripts/terra_jupyter_contract_smoke.sh
      - name: Run published Terra Jupyter launch smoke
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
        run: >-
          bash images/platform/scripts/terra_jupyter_launch_smoke.sh
          "${IMAGE_NAME}:${IMAGE_CHANNEL}-terra"
      - name: Run published Terra Leonardo Jupyter launch smoke
        env:
          HEARTWOOD_TERRA_HOST_PORT: "8001"
          HEARTWOOD_TERRA_JUPYTER_MODE: leonardo
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
        run: >-
          bash images/platform/scripts/terra_jupyter_launch_smoke.sh
          "${IMAGE_NAME}:${IMAGE_CHANNEL}-terra"

  publish:
    name: Publish multi-architecture image manifests
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish image manifests
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}-coder-7b" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}-coder-7b" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-coder-7b-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-coder-7b-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}-smoke" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}-smoke" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-smoke-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-smoke-arm64"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${IMAGE_CHANNEL}-providers" \
            --tag "${IMAGE_NAME}:sha-${GIT_SHA}-providers" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-providers-amd64" \
            "${IMAGE_NAME}:${IMAGE_CHANNEL}-providers-arm64"
      - name: Verify image manifests
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_CHANNEL: edge
          GIT_SHA: ${{ github.sha }}
        run: |
          public_manifest_raw() {
            local image_ref="${IMAGE_NAME}:$1"
            local docker_config
            local raw
            docker_config="$(mktemp -d)"
            echo "Verifying public GHCR access for ${image_ref}" >&2
            if ! raw="$(DOCKER_CONFIG="${docker_config}" docker buildx imagetools inspect --raw "${image_ref}")"; then
              rm -rf "${docker_config}"
              return 1
            fi
            rm -rf "${docker_config}"
            printf '%s\n' "${raw}"
          }
          verify_multi_platform_tag() {
            image_ref="${IMAGE_NAME}:$1"
            raw="$(public_manifest_raw "$1")"
            printf '%s\n' "${raw}" | grep -E '"architecture"[[:space:]]*:[[:space:]]*"amd64"'
            printf '%s\n' "${raw}" | grep -E '"architecture"[[:space:]]*:[[:space:]]*"arm64"'
          }
          verify_multi_platform_tag "${IMAGE_CHANNEL}"
          verify_multi_platform_tag "sha-${GIT_SHA}"
          verify_multi_platform_tag "${IMAGE_CHANNEL}-coder-7b"
          verify_multi_platform_tag "sha-${GIT_SHA}-coder-7b"
          verify_multi_platform_tag "${IMAGE_CHANNEL}-smoke"
          verify_multi_platform_tag "sha-${GIT_SHA}-smoke"
          verify_multi_platform_tag "${IMAGE_CHANNEL}-providers"
          verify_multi_platform_tag "sha-${GIT_SHA}-providers"
