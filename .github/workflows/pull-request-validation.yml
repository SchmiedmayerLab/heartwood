name: Pull Request Validation

on:
  pull_request:

concurrency:
  group: pull-request-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql.yml
  documentation:
    name: Documentation
    uses: ./.github/workflows/documentation.yml
  container-smoke:
    name: Container Smoke Tests
    uses: ./.github/workflows/container-smoke.yml
  gpu-containers:
    name: GPU Container Candidates
    uses: ./.github/workflows/gpu-container-pr.yml
  native-assets:
    name: Native Release Assets
    uses: ./.github/workflows/native-release.yml
  python:
    name: Python
    uses: ./.github/workflows/python.yml
  secrets:
    name: Secret Scan
    uses: ./.github/workflows/gitleaks.yml
  validation:
    name: Repository Validation
    uses: ./.github/workflows/validate.yml
  web-ui:
    name: Web UI
    uses: ./.github/workflows/web-ui.yml
  release-ready:
    name: Release Candidate Ready
    if: ${{ always() }}
    needs:
      - codeql
      - container-smoke
      - documentation
      - gpu-containers
      - native-assets
      - python
      - secrets
      - validation
      - web-ui
    runs-on: ubuntu-24.04
    steps:
      - name: Require every pull-request validation workflow
        env:
          VALIDATION_RESULTS: ${{ toJson(needs) }}
        run: |
          jq --exit-status 'to_entries | all(.value.result == "success")' \
            <<<"${VALIDATION_RESULTS}"
