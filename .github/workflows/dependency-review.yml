name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    # Dependency review needs the GitHub dependency graph, which requires a
    # public repository or GitHub Advanced Security. This job is skipped while
    # the repository is private and runs automatically once it is public.
    if: ${{ github.event.repository.private == false }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Review dependencies
        uses: actions/dependency-review-action@v5.0.0
        with:
          # vLLM 0.25.0 directly requires diskcache 5.6.3 and the advisory has
          # no patched release. Heartwood does not load caches from another
          # trust domain; revisit this exception with every vLLM update.
          allow-ghsas: GHSA-w8v5-vhqr-4h9v
