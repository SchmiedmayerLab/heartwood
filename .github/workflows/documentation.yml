name: Documentation

on:
  workflow_call:
    inputs:
      publish_artifact:
        description: Build and upload an existing published release for GitHub Pages
        required: false
        default: false
        type: boolean
      version:
        description: Published Semantic Version to deploy
        required: false
        default: ""
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Require a version for publication
        if: inputs.publish_artifact && inputs.version == ''
        run: |
          echo "A published Semantic Version is required for deployment." >&2
          exit 1
      - name: Checkout documentation source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.publish_artifact && format('refs/tags/{0}', inputs.version) || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify published release source
        if: inputs.publish_artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python3 deploy/verify_release_candidate.py \
            --version "${RELEASE_VERSION}" \
            --source-root . \
            --version-only
          test "$(git tag --points-at HEAD --list "${RELEASE_VERSION}")" = "${RELEASE_VERSION}"
          release_json="$(gh release view "${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json isDraft,isPrerelease,targetCommitish)"
          test "$(jq -r .isDraft <<<"${release_json}")" = "false"
          if [[ "$(jq -r .isPrerelease <<<"${release_json}")" != "false" ]]; then
            echo "Prerelease documentation cannot replace the stable site." >&2
            exit 1
          fi
          test "$(jq -r .targetCommitish <<<"${release_json}")" = "$(git rev-parse HEAD)"
          latest_version="$(gh release view \
            --repo "${GITHUB_REPOSITORY}" \
            --json tagName \
            --jq .tagName)"
          if [[ "${latest_version}" != "${RELEASE_VERSION}" ]]; then
            echo "Documentation can be published only for the latest release." >&2
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Install the pinned documentation toolchain
        run: uv sync --locked --only-group docs
      - name: Stage canonical documentation
        run: uv run --no-sync python deploy/stage_documentation.py
      - name: Build documentation strictly
        run: uv run --no-sync zensical build --clean --strict
      - name: Verify the static site
        run: test -s site/index.html
      - name: Upload GitHub Pages artifact
        if: inputs.publish_artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
