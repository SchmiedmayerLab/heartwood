name: Documentation

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Install the pinned documentation toolchain
        run: uv sync --locked --only-group docs
      - name: Stage canonical documentation
        run: uv run --no-sync python deploy/stage_documentation.py
      - name: Build documentation strictly
        run: uv run --no-sync zensical build --clean --strict
      - name: Verify the static site
        run: test -s site/index.html
      - name: Verify stable and preview publication locally
        run: uv run --no-sync bash deploy/tests/versioned_documentation_smoke.sh
