version = 1

# Files that cannot carry an inline SPDX header — the root license file, the
# generated lockfile, the Python pin, and empty PEP 561 markers — are annotated
# here. Everything else (including Markdown, via an HTML-comment header) carries
# its own SPDX header.
[[annotations]]
path = [
    "LICENSE",
    ".python-version",
    "uv.lock",
    "**/py.typed",
    "**/__pycache__/**",
    "fixtures/**/*.csv",
    "fixtures/**/*.json",
    "fixtures/**/*.jsonl",
    "skills/**/*.json",
    "evals/**/*.json",
    "docs/**/*.ipynb",
    "packages/webui/package.json",
    "packages/webui/package-lock.json",
    "packages/webui/tsconfig.json",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Stanford University and the project authors (see CONTRIBUTORS.md)"
SPDX-License-Identifier = "MIT"
