schema_version = "heartwood.platform-images.v1"
image_name = "ghcr.io/schmiedmayerlab/heartwood"
moving_channel = "edge"
default_platform = "terra"

[defaults]
dockerfile = "images/Dockerfile"
runtime_home = "/opt/heartwood"
web_port = 8767
web_host = "127.0.0.1"
entrypoint_policy = "Preserve the platform base image entrypoint; CI smoke tests override entrypoint only when running Heartwood validation scripts."
secret_policy = "Credentials are session-only values or bindings to platform secrets, mounted files, or managed identity; never bake secret values into images, project configuration, labels, or examples."
model_weight_policy = "Never bake model weights into platform images; use persistent mounted storage or an authorized provider endpoint."

[platforms.terra]
status = "implemented"
base_image = "us.gcr.io/broad-dsp-gcr-public/terra-jupyter-python:1.1.6"
base_image_source = "https://github.com/DataBiosphere/terra-docker/blob/master/config/conf.json"
base_image_family = "terra-jupyter-python"
base_image_version = "1.1.6"
base_image_parent = "us.gcr.io/broad-dsp-gcr-public/terra-jupyter-base:1.1.4"
base_platform = "linux/amd64"
platform_home = "/home/jupyter"
platform_user = "jupyter"
jupyter_prefix = "/opt/conda"
notebook_kernel = "heartwood"
image_user = "jupyter"
working_dir = "/home/jupyter"
entrypoint = ["/opt/conda/bin/jupyter", "notebook"]
exposed_ports = ["8000/tcp"]
required_env = [
    "HEARTWOOD_PLATFORM=terra",
    "HEARTWOOD_PLATFORM_HOME=/home/jupyter",
    "HEARTWOOD_PYTHON=/opt/heartwood/.venv/bin/python",
]
forbidden_path_entries = ["/opt/heartwood/.venv/bin"]
proxy = "jupyter-server-proxy under the Terra Leonardo proxy"
registry_policy = "Publish public GHCR tags as single-platform Docker schema-2 manifests because Terra Leonardo image auto-detection does not accept OCI indexes; use an approved private registry for controlled deployments."
manifest_media_type = "application/vnd.docker.distribution.manifest.v2+json"
config_media_type = "application/vnd.docker.container.image.v1+json"
publish_attestations = false
allow_non_platform_manifests = false
supported_platforms = ["linux/amd64"]
unsupported_platforms = ["linux/arm64"]
unsupported_reason = "The selected Terra Jupyter base is amd64-only; publish ARM only after the base image and Leonardo path support it."
runtime_target = "terra-runtime"
gpu_runtime_target = "terra-runtime-gpu-nvidia"
ci_target = "terra-ci"
runtime_tag = "edge-terra"
gpu_runtime_tag = "edge-terra-gpu-nvidia"
ci_tag = "edge-terra-ci"
commit_runtime_tag = "sha-<git-sha>-terra"
commit_gpu_runtime_tag = "sha-<git-sha>-terra-gpu-nvidia"
bundles_model_artifact = false
gpu_runtime = "vllm @ https://github.com/vllm-project/vllm/releases/download/v0.10.1.1/vllm-0.10.1.1%2Bcu118-cp38-abi3-manylinux1_x86_64.whl"
model_cache = "<project>/.heartwood/models"
ci_required = true
live_workspace_validation_required = true

[platforms.terra.required_env_contains]
PATH = ["/opt/llama.cpp", "/opt/conda/bin", "/usr/local/bin"]
LD_LIBRARY_PATH = ["/usr/local/cuda/lib64", "/usr/local/nvidia/lib64"]
JUPYTER_PATH = ["/opt/conda/share/jupyter"]

[[platforms.terra.required_evidence]]
name = "local-ci-smoke"
description = "Build the no-weight Terra CI image through the shared production image assembly; verify arbitrary current-directory project isolation and restart persistence; exercise the inherited Jupyter contract, Heartwood UI, readiness API, and both notebook proxy routes; and run the OpenHands loopback smoke with Docker networking disabled."

[[platforms.terra.required_evidence]]
name = "main-publish-real-terra"
description = "Build the no-weight runtime from the real Terra base as an untagged digest, verify its Docker schema-2 manifest and image configuration, run current-directory persistence, Jupyter, Leonardo, Heartwood proxy, OpenHands, and mounted Heartwood-managed inference smokes against that exact digest, then create the immutable commit tag and move the channel tag last."

[[platforms.terra.required_evidence]]
name = "live-terra-smoke"
description = "Launch the published Terra image in a synthetic workspace, configure an authorized model profile, use the web UI and CLI against one session, and record image digest, proxy behavior, and scrubbed audit export."
