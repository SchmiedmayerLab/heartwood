schema_version = "heartwood.local-model-catalog.v1"
default_smoke_model = "llama-cpp-stories260k-ci"
first_coding_model_candidate = "qwen25-coder-1_5b-instruct"
high_capability_agent_candidate = "qwen3-coder-30b-a3b-instruct"

[models.llama-cpp-stories260k-ci]
status = "implemented"
purpose = "Tiny GGUF load/query artifact for CI and tutorial smoke tests only."
image_flavors = ["smoke"]
runtime_profile = "llama-cpp-cpu"
artifact_manifest = "images/generic/local-runtime/models/stories260k.toml"
quality_claim = false
production_use = false

[models.qwen25-coder-1_5b-instruct]
status = "candidate"
purpose = "First small CPU-friendly coding model for a future optional bundled local coding image."
source_model = "Qwen/Qwen2.5-Coder-1.5B-Instruct"
source_url = "https://huggingface.co/Qwen/Qwen2.5-Coder-1.5B-Instruct"
license = "Apache-2.0"
parameter_count = "1.54B"
context_length = 32768
expected_artifact_format = "GGUF"
expected_quantization = "Q4_K_M or comparable reviewed CPU quantization"
image_flavors = ["model-qwen25-coder-1_5b-q4_k_m"]
implementation_requirements = [
  "Pin exact source revision and quantized artifact URL.",
  "Record artifact byte size and SHA-256 before publication.",
  "Confirm redistribution posture for the selected quantized artifact, not only the base model.",
  "Document CPU and memory envelope for linux/amd64 and linux/arm64.",
  "Run scheduled or release CI separate from pull-request smoke if the artifact is too large for PR gates.",
]

[models.qwen3-4b-instruct-2507]
status = "candidate"
purpose = "Small newer general agentic model candidate when tool-calling quality matters more than code-only specialization."
source_model = "Qwen/Qwen3-4B-Instruct-2507"
source_url = "https://huggingface.co/Qwen/Qwen3-4B-Instruct-2507"
license = "Apache-2.0"
parameter_count = "4B"
context_length = 262144
expected_artifact_format = "GGUF"
image_flavors = ["future-local-model"]
implementation_requirements = [
  "Verify quantized artifact availability and license posture.",
  "Define CPU and optional GPU resource envelope.",
  "Validate tool-calling behavior through the gateway approval and audit path.",
]

[models.qwen3-coder-30b-a3b-instruct]
status = "candidate"
purpose = "Higher-capability local coding-agent profile for GPU or high-memory environments."
source_model = "Qwen/Qwen3-Coder-30B-A3B-Instruct"
source_url = "https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct"
license = "Apache-2.0"
parameter_count = "30.5B total, 3.3B active"
context_length = 262144
expected_artifact_format = "GGUF or vLLM/SGLang-compatible weights"
image_flavors = ["future-gpu-local-model"]
implementation_requirements = [
  "Keep out of required pull-request CI.",
  "Use a separate CUDA/vLLM/SGLang profile and GPU-capable runner.",
  "Route model access through gateway policy rather than direct OpenHands egress.",
]

[models.qwen3-coder-next]
status = "watch"
purpose = "Promising future efficient coding-agent family; do not pin until public artifacts, license, quantization, and runtime support are reviewed."
source_model = "Qwen3-Coder-Next"
source_url = "https://arxiv.org/abs/2603.00729"
license = "to be verified on selected artifact"
parameter_count = "80B total, 3B active"
image_flavors = ["future-gpu-local-model"]
implementation_requirements = [
  "Verify model-card availability and exact artifact license.",
  "Verify inference runtime support before adding an image target.",
]
