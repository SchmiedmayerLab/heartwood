schema_version = "heartwood.local-model-catalog.v1"
default_smoke_model = "llama-cpp-stories260k-ci"
default_demo_agent_model = "qwen25-7b-instruct-q4_k_m"
default_demo_coding_model = "qwen25-coder-7b-instruct-q4_k_m"
storage_policy = "Artifacts are downloaded only after an explicit CLI or web request and must be stored outside the container image in mounted or platform-persistent storage."

[models.qwen25-7b-instruct-q4_k_m]
status = "implemented"
purpose = "Heartwood-managed model for synthetic tool-use demonstrations; not reviewed for biomedical use."
runtime_profile = "llama-cpp-cpu"
artifact_manifest = "images/generic/local-runtime/models/qwen25-7b-instruct-q4_k_m.toml"
quality_claim = false
quality_claim_scope = "Demo-quality Heartwood-managed agent output only; no biomedical, production, or benchmark claim."
production_use = false

[models.qwen25-coder-7b-instruct-q4_k_m]
status = "implemented"
purpose = "Advanced coding-output experiment; not validated for structured agent tools or biomedical use."
runtime_profile = "llama-cpp-cpu"
artifact_manifest = "images/generic/local-runtime/models/qwen25-coder-7b-q4_k_m.toml"
quality_claim = false
quality_claim_scope = "Demo-quality Heartwood-managed coding output only; no biomedical, production, or benchmark claim."
production_use = false

[models.llama-cpp-stories260k-ci]
status = "implemented"
purpose = "Installation and offline checks only; not suitable for coding tasks."
runtime_profile = "llama-cpp-cpu"
artifact_manifest = "images/generic/local-runtime/models/stories260k.toml"
quality_claim = false
production_use = false
