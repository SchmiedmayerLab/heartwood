schema_version = "1"
default_profile = "llama-cpp-cpu"
fallback_fixture_profile = "stub-loopback"
model_weight_policy = "No runtime profile embeds model weights in an image."

[profiles.stub-loopback]
status = "implemented"
purpose = "Deterministic OpenAI-compatible fixture for the OpenHands, policy, audit, CLI, and web integration path."
runtime = "heartwood-loopback-stub"
inference_runtime = false
model_artifact_required = false
quality_claim = false
endpoint = "http://127.0.0.1:8765/v1/chat/completions"
startup = "Set HEARTWOOD_LOCAL_RUNTIME_PROFILE=stub-loopback and run images/generic/scripts/start_local_runtime.sh."
runtime_network = "none"
supported_platforms = ["linux/amd64", "linux/arm64"]
ci_scope = "Pull requests, pushes to main, and local Compose smoke tests."

[profiles.llama-cpp-cpu]
status = "implemented"
purpose = "Portable CPU inference for an explicitly downloaded or mounted GGUF artifact."
runtime = "llama.cpp llama-server"
runtime_dependency = "ggml-org/llama.cpp b9937 Ubuntu CPU binary selected for linux/amd64 or linux/arm64"
runtime_binary = "/opt/llama.cpp/llama-server"
runtime_artifacts = [
  "llama-b9937-bin-ubuntu-x64.tar.gz SHA-256 937e10a3fb6c4b1791f943230525e91bea168d1305c1d21079970acb70205df3",
  "llama-b9937-bin-ubuntu-arm64.tar.gz SHA-256 c8212588514e33150dcff64fbadbf151d978fd9c4de05d0f66b2267b24310ac4",
]
model_artifact_required = true
artifact_format = "GGUF"
endpoint = "http://127.0.0.1:8765/v1/chat/completions"
host = "127.0.0.1"
port = 8765
supported_platforms = ["linux/amd64", "linux/arm64"]
startup = "Run heartwood models download <artifact-id>, then heartwood launch from the project directory."
artifact_cache = "The selected project's .heartwood/models directory, backed by the project volume or platform-persistent storage."
runtime_resolution = "Load only the path selected by the operator; recommended and user-selected downloads verify immutable provenance and content before use."
ci_scope = "CI tests the OpenHands integration with a deterministic loopback fixture and tests artifact verification separately; CI never embeds weights in images."

[profiles.llama-cpp-cuda]
status = "deferred"
purpose = "Optional NVIDIA GPU acceleration when a controlled deployment justifies a separate tested runtime."
base_profile = "llama-cpp-cpu"
supported_platforms = ["linux/amd64"]
implementation_requirements = [
  "Select and pin a CUDA-capable runtime image or binary.",
  "Test host GPU visibility and the no-weight mounted-artifact path on a GPU runner.",
  "Keep the model profile, policy, OpenHands, and audit contracts identical to llama-cpp-cpu.",
]
