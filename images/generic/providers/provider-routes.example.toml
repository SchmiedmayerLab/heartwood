schema_version = "heartwood.provider-config.v1"
default_route = "local-loopback"

[[routes]]
route_id = "local-loopback"
provider = "openai-compatible"
endpoint = "http://127.0.0.1:8765/v1/chat/completions"
model = "heartwood-local-runtime"
capability_tier = "supervised"
auth = "none"
notes = "Local llama-cpp smoke route; must still be allowlisted by the active policy profile."

[[routes]]
route_id = "openai"
provider = "openai"
endpoint = "https://api.openai.com/v1/chat/completions"
model = "configured-by-platform"
capability_tier = "supervised"
auth = "secret-file"
secret_file = "/run/secrets/openai_api_key"
notes = "Example only. The endpoint remains denied unless the platform policy explicitly allowlists it."

[[routes]]
route_id = "azure-openai"
provider = "azure-openai"
endpoint = "https://example-resource.openai.azure.com/openai/deployments/example/chat/completions"
model = "configured-by-platform"
capability_tier = "supervised"
auth = "secret-file"
secret_file = "/run/secrets/azure_openai_api_key"
notes = "Example only; replace endpoint and secret mount through the platform deployment."

[[routes]]
route_id = "anthropic"
provider = "anthropic"
endpoint = "https://api.anthropic.com/v1/messages"
model = "configured-by-platform"
capability_tier = "supervised"
auth = "secret-file"
secret_file = "/run/secrets/anthropic_api_key"
notes = "Example only; use through a policy-gated provider adapter before live invocation."

[[routes]]
route_id = "vertex-ai"
provider = "vertex-ai"
endpoint = "https://aiplatform.googleapis.com/v1/projects/example/locations/us-central1/publishers/google/models/example:generateContent"
model = "configured-by-platform"
capability_tier = "supervised"
auth = "managed-identity"
notes = "Example only; platform service identity supplies credentials outside the image."

[[routes]]
route_id = "bedrock"
provider = "bedrock"
endpoint = "https://bedrock-runtime.us-east-1.amazonaws.com/model/example/invoke"
model = "configured-by-platform"
capability_tier = "supervised"
auth = "managed-identity"
notes = "Example only; AWS role/session credentials must be supplied by the platform boundary."
