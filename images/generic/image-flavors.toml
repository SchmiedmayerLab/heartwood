schema_version = "heartwood.image-flavors.v1"
image_name = "ghcr.io/schmiedmayerlab/heartwood"
moving_channel = "edge"
commit_tag_pattern = "sha-<git-sha>"
release_tag_pattern = "<semver>"
latest_policy = "Publish latest only after the first stable release; do not use latest for unreleased main-branch builds."
model_weight_policy = "No Heartwood image contains model weights. Download a recommended or supported user-selected model into mounted storage, or connect a policy-authorized provider at runtime."

[flavors.runtime]
target = "runtime"
moving_tag = "edge"
commit_tag = "sha-<git-sha>"
purpose = "Portable CLI, web UI, notebook bridge, OpenHands SDK, verified Skills, policy and audit controls, provider presets, and llama.cpp runtime without credentials or model weights."
bundles_model_artifact = false
runtime_network_default = "Controlled by the deployment; model endpoints must pass the Heartwood route policy before OpenHands starts a turn."
ci_required = true
public_default = true
supported_platforms = ["linux/amd64", "linux/arm64"]

[platform_flavors.terra_runtime]
target = "terra-runtime"
moving_tag = "edge-terra"
commit_tag = "sha-<git-sha>-terra"
purpose = "Terra-derived Jupyter runtime with the same Heartwood application and no credentials or model weights."
platform = "terra"
base_image = "us.gcr.io/broad-dsp-gcr-public/terra-jupyter-python:1.1.6"
bundles_model_artifact = false
runtime_network_default = "Controlled by Terra workspace policy; model endpoints must pass the Heartwood route policy before OpenHands starts a turn."
ci_required = true
public_default = false
supported_platforms = ["linux/amd64"]
manifest_media_type = "application/vnd.docker.distribution.manifest.v2+json"
config_media_type = "application/vnd.docker.container.image.v1+json"
publish_attestations = false
allow_non_platform_manifests = false

[flavors.runtime_gpu_nvidia]
target = "runtime-gpu-nvidia"
moving_tag = "edge-gpu-nvidia"
commit_tag = "sha-<git-sha>-gpu-nvidia"
purpose = "AMD64 NVIDIA runtime with the complete Heartwood payload and an isolated pinned vLLM environment; no model weights or credentials."
bundles_model_artifact = false
runtime_network_default = "vLLM binds to loopback; other model routes remain deployment-controlled."
ci_required = true
public_default = false
supported_platforms = ["linux/amd64"]

[platform_flavors.terra_runtime_gpu_nvidia]
target = "terra-runtime-gpu-nvidia"
moving_tag = "edge-terra-gpu-nvidia"
commit_tag = "sha-<git-sha>-terra-gpu-nvidia"
purpose = "Terra-derived AMD64 NVIDIA runtime with the same Heartwood payload and an isolated pinned vLLM environment."
platform = "terra"
base_image = "us.gcr.io/broad-dsp-gcr-public/terra-jupyter-python:1.1.6"
bundles_model_artifact = false
runtime_network_default = "vLLM binds to loopback; other model routes remain controlled by Terra policy."
ci_required = true
public_default = false
supported_platforms = ["linux/amd64"]
manifest_media_type = "application/vnd.docker.distribution.manifest.v2+json"
config_media_type = "application/vnd.docker.container.image.v1+json"
publish_attestations = false
allow_non_platform_manifests = false
