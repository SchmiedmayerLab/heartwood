[project]
name = "heartwood-adapters"
version = "0.2.0-beta.7"
description = "Adapter service provider interfaces and conformance checks for Heartwood."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "heartwood-detector",
    "heartwood-model-policy",
    "heartwood-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-detector = { workspace = true }
heartwood-model-policy = { workspace = true }
heartwood-schemas = { workspace = true }
