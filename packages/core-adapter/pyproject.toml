[project]
name = "heartwood-core-adapter"
version = "0.1.0"
description = "Core harness orchestration for Heartwood sessions."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "heartwood-adapters",
    "heartwood-audit",
    "heartwood-model-policy",
    "heartwood-schemas",
    "heartwood-session",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-adapters = { workspace = true }
heartwood-audit = { workspace = true }
heartwood-model-policy = { workspace = true }
heartwood-schemas = { workspace = true }
heartwood-session = { workspace = true }
