[project]
name = "heartwood-notebook"
version = "0.1.1"
description = "Notebook-facing Python API and widget bridge for Heartwood sessions."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "heartwood-gateway",
    "heartwood-session",
]

[project.optional-dependencies]
widgets = [
    "ipywidgets>=8.1",
    "jupyterlab>=4.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-gateway = { workspace = true }
heartwood-session = { workspace = true }
