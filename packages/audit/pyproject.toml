[project]
name = "heartwood-audit"
version = "0.1.1"
description = "Hash-chained audit logging for Heartwood sessions."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = ["heartwood-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-schemas = { workspace = true }
