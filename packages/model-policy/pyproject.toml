[project]
name = "heartwood-model-policy"
version = "0.0.0"
description = "Deny-by-default model-call policy evaluation for Heartwood."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = ["heartwood-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-schemas = { workspace = true }
