[project]
name = "heartwood-fixtures"
version = "0.2.0-beta.10"
description = "Synthetic fixture linting for Heartwood tests and replay artifacts."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = []

[project.scripts]
heartwood-fixtures = "heartwood.fixtures:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]
