[project]
name = "heartwood-cli"
version = "0.0.0"
description = "The heartwood command-line interface — the primary interaction surface."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = ["heartwood-detector"]

[project.scripts]
heartwood = "heartwood.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-detector = { workspace = true }
