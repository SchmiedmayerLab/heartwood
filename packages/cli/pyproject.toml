[project]
name = "heartwood-cli"
version = "0.2.0-beta.2"
description = "The heartwood command-line interface — the primary interaction surface."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "heartwood-compliance",
    "heartwood-gateway",
    "heartwood-session",
    "packaging==26.2",
    "textual==8.2.8",
    "uvicorn==0.51.0",
]

[project.scripts]
heartwood = "heartwood.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-compliance = { workspace = true }
heartwood-gateway = { workspace = true }
heartwood-session = { workspace = true }
