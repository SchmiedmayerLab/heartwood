[project]
name = "heartwood-detector"
version = "0.2.0-beta.2"
description = "Deterministic, propose-not-commit environment and dataset detection for Heartwood."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = ["heartwood-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-schemas = { workspace = true }
