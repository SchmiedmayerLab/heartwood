[project]
name = "heartwood-compliance"
version = "0.2.0"
description = "Synthetic-only reviewer packet and audit bundle generation for Heartwood."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "heartwood-audit",
    "heartwood-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-audit = { workspace = true }
heartwood-schemas = { workspace = true }
