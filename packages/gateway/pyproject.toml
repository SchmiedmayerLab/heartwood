[project]
name = "heartwood-gateway"
version = "0.0.0"
description = "Session gateway for Heartwood command and event streams."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "heartwood-adapters",
    "heartwood-core-adapter",
    "heartwood-model-policy",
    "heartwood-schemas",
    "heartwood-session",
]

[project.optional-dependencies]
agent-server = [
    "libtmux==0.61.0; python_version >= '3.12'",
    "openhands-agent-server==1.34.0; python_version >= '3.12'",
    "openhands-tools==1.34.0; python_version >= '3.12'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-adapters = { workspace = true }
heartwood-core-adapter = { workspace = true }
heartwood-model-policy = { workspace = true }
heartwood-schemas = { workspace = true }
heartwood-session = { workspace = true }
