[project]
name = "heartwood-gateway"
version = "0.2.0-beta.2"
description = "Session gateway for Heartwood command and event streams."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Stanford University and the project authors" }]
dependencies = [
    "anthropic==0.116.0",
    "filelock==3.29.7",
    "heartwood-adapters",
    "heartwood-core-adapter",
    "heartwood-model-policy",
    "heartwood-schemas",
    "heartwood-session",
    "heartwood-skills",
    "huggingface-hub==1.23.0",
    "openai==2.45.0",
    "tomli-w==1.2.0",
]

[project.optional-dependencies]
agent = [
    "openhands-sdk==1.36.0",
    "openhands-tools==1.36.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heartwood"]

[tool.uv.sources]
heartwood-adapters = { workspace = true }
heartwood-core-adapter = { workspace = true }
heartwood-model-policy = { workspace = true }
heartwood-schemas = { workspace = true }
heartwood-session = { workspace = true }
heartwood-skills = { workspace = true }
