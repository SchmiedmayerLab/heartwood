# Mirrors the fast CI checks so failures surface locally. Run `pre-commit install`
# once; hooks then run on every commit. `pre-commit autoupdate` bumps the pinned revs.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy packages
        language: system
        types: [python]
        pass_filenames: false
