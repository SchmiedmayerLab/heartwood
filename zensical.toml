[project]
site_name = "Heartwood"
site_description = "Auditable agentic coding for biomedical research environments"
site_url = "https://schmiedmayerlab.github.io/heartwood/"
repo_url = "https://github.com/SchmiedmayerLab/heartwood"
repo_name = "SchmiedmayerLab/heartwood"
docs_dir = "build/documentation"
site_dir = "site"
copyright = "Copyright Stanford University and the Heartwood project authors"
extra_css = ["stylesheets/extra.css"]
nav = [
    { "Home" = "index.md" },
    { "Get Started" = [
        { "Get Started" = "docs/getting-started.md" },
        { "Choose an Environment" = "docs/platforms.md" },
        { "Install Heartwood" = "docs/installation.md" },
        { "Projects and Persistent State" = "docs/project-state.md" },
    ] },
    { "Using Heartwood" = [
        { "Work with Heartwood" = "docs/using-heartwood.md" },
        { "Terminal, Browser, and Notebook" = "docs/web-interface.md" },
    ] },
    { "Models" = [
        { "Choose a Model" = "docs/model-connections.md" },
        { "Run a Model Locally" = "docs/getting-started-offline.md" },
    ] },
    { "Environments" = [
        { "Containers" = "docs/container-images.md" },
        { "Terra" = "docs/terra-jupyter-demo.md" },
        { "Stanford Carina" = "docs/carina-cli.md" },
        { "Supported Environments" = "docs/platform-support.md" },
    ] },
    { "For Operators" = [
        { "Deployment Overview" = "docs/deployment.md" },
        { "Security and Data Boundaries" = "design/05-security-compliance.md" },
    ] },
    { "Architecture" = [
        { "Product and Scope" = "design/01-overview.md" },
        { "System Architecture" = "design/03-architecture.md" },
        { "Deployment Architecture" = "design/02-platforms.md" },
        { "Skills" = "design/04-skills.md" },
        { "Audit and Reproducibility" = "design/06-observability-audit.md" },
        { "Testing and Evidence" = "design/07-testing-eval.md" },
    ] },
    { "Reference" = [
        { "Command Reference" = "docs/cli-reference.md" },
        { "Troubleshooting" = "docs/troubleshooting.md" },
        { "Glossary and Acronyms" = "ACRONYMS.md" },
    ] },
    { "Project" = [
        { "Contributing" = "CONTRIBUTING.md" },
        { "Development and Release Engineering" = "design/08-development.md" },
        { "Build a Platform Image" = "docs/platform-images.md" },
        { "Release Heartwood" = "docs/releases.md" },
        { "License" = "LICENSE" },
    ] },
]

[project.validation]
invalid_links = true
invalid_link_anchors = true
unresolved_references = true
unresolved_footnotes = true

[project.extra.version]
provider = "mike"
alias = true

[project.theme]
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
logo = "lucide/trees"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Use light appearance"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Use dark appearance"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Follow system appearance"

[project.markdown_extensions]
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
