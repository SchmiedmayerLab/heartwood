[project]
site_name = "Heartwood"
site_description = "Auditable agentic coding for biomedical research environments"
site_url = "https://schmiedmayerlab.github.io/heartwood/"
repo_url = "https://github.com/SchmiedmayerLab/heartwood"
repo_name = "SchmiedmayerLab/heartwood"
docs_dir = "documentation"
site_dir = "site"
copyright = "Copyright Stanford University and the Heartwood project authors"
extra_css = ["stylesheets/extra.css"]
nav = [
    { "Home" = "index.md" },
    { "Get Started" = [
        { "Your First Project" = "start/index.md" },
        { "Install Heartwood" = "start/install.md" },
        { "Projects and Private State" = "start/project.md" },
    ] },
    { "Work With Heartwood" = [
        { "Core Workflow" = "use/index.md" },
        { "Terminal" = "use/terminal.md" },
        { "Browser" = "use/browser.md" },
        { "Notebooks" = "use/notebooks.md" },
        { "Actions and Audit History" = "use/actions-audit.md" },
        { "Research Skills" = "use/skills.md" },
    ] },
    { "Models" = [
        { "Choose Where Models Run" = "models/index.md" },
        { "Hosted and Managed Models" = "models/connections.md" },
        { "Choose a Heartwood-Managed Model" = "models/choose-managed.md" },
        { "Run a Model With Heartwood" = "models/run-with-heartwood.md" },
        { "Work Without Internet Access" = "models/offline.md" },
    ] },
    { "Platforms" = [
        { "Choose a Platform" = "platforms/index.md" },
        { "Containers" = "platforms/containers.md" },
        { "Native Linux" = "platforms/native-linux.md" },
        { "Terra" = "platforms/terra.md" },
        { "Stanford Carina" = "platforms/carina.md" },
    ] },
    { "Operate Heartwood" = [
        { "Deployment Responsibilities" = "operate/index.md" },
        { "Security and Controlled Data" = "operate/security.md" },
        { "Add a Platform" = "operate/platform-integration.md" },
    ] },
    { "How Heartwood Works" = [
        { "Product Boundaries" = "architecture/index.md" },
        { "System Architecture" = "architecture/system.md" },
        { "Sessions and Audit" = "architecture/sessions-audit.md" },
        { "Testing and Evidence" = "architecture/testing.md" },
    ] },
    { "Reference" = [
        { "Command Reference" = "reference/cli.md" },
        { "Configuration and State" = "reference/configuration.md" },
        { "Platform Capabilities" = "reference/capabilities.md" },
        { "GPU Compatibility" = "reference/gpu-compatibility.md" },
        { "Diagnostics and Troubleshooting" = "reference/troubleshooting.md" },
        { "Glossary" = "reference/glossary.md" },
    ] },
    { "Contribute" = [
        { "Contribute to Heartwood" = "contribute/index.md" },
        { "Development Guide" = "contribute/development.md" },
        { "Documentation Guide" = "contribute/documentation.md" },
        { "Release Guide" = "contribute/releases.md" },
    ] },
]

[project.validation]
invalid_links = true
invalid_link_anchors = true
unresolved_references = true
unresolved_footnotes = true

[project.extra.version]
provider = "mike"
alias = true

[project.theme]
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
logo = "lucide/trees"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Use light appearance"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Use dark appearance"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Follow system appearance"

[project.markdown_extensions]
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
